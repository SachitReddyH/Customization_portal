services:

  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: capstone-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false                    # Set this in Render dashboard
      - key: DATABASE_NAME
        value: capstone_portal
      - key: SECRET_KEY
        sync: false                    # Set this in Render dashboard
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ADMIN_EMAIL
        sync: false                    # Set this in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false                    # Set this in Render dashboard

  # ─── Frontend (React / Vite) ──────────────────────────────────────────────
  - type: web
    name: capstone-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html      # Needed for React Router (SPA)
    envVars:
      - key: VITE_API_URL
        sync: false                    # After backend deploys, set to: https://capstone-backend.onrender.com
